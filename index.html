<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Apka Darterska</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="p-4 md:p-8 relative overflow-x-hidden">

    <div id="toast-container" class="fixed top-4 z-50 w-full max-w-xs pointer-events-none left-1/2 -translate-x-1/2 flex flex-col gap-2"></div>

    <div id="celebration-overlay" class="hidden fixed inset-0 z-40 flex flex-col items-center justify-center bg-slate-950/80 backdrop-blur-md pointer-events-none">
        <div class="relative flex items-center justify-center w-64 h-64">
            <div class="burst-ring border-sky-400 w-full h-full" style="animation-delay: 0s;"></div>
            <div class="burst-ring border-amber-400 w-full h-full" style="animation-delay: 0.3s;"></div>
            <div class="burst-ring border-emerald-400 w-full h-full" style="animation-delay: 0.6s;"></div>
            <div class="z-10 text-center">
                <div class="text-amber-400 font-bold text-lg tracking-widest uppercase animate-bounce">LEG ZDOBYTY!</div>
                <div id="celebration-winner" class="text-5xl font-black text-white italic uppercase tracking-tighter mt-2 drop-shadow-[0_5px_15px_rgba(56,189,248,0.6)]">GRACZ 1</div>
            </div>
        </div>
    </div>

    <div id="confirm-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/70 backdrop-blur-sm px-4">
        <div class="glass p-6 border border-slate-700 max-w-sm w-full text-center space-y-4">
            <h3 class="text-lg font-bold text-white">Czy na pewno chcesz zresetować grę?</h3>
            <p class="text-xs text-slate-400">Aktualne punkty i historia legów zostaną bezpowrotnie usunięte.</p>
            <div class="flex gap-3">
                <button onclick="closeConfirmModal(false)" class="flex-1 bg-slate-800 hover:bg-slate-700 text-white font-bold py-2 rounded-xl text-xs uppercase border border-slate-600 transition-all">Anuluj</button>
                <button onclick="closeConfirmModal(true)" class="flex-1 bg-rose-600 hover:bg-rose-500 text-white font-bold py-2 rounded-xl text-xs uppercase transition-all">Tak, resetuj</button>
            </div>
        </div>
    </div>

    <div id="lobby" class="w-full max-w-2xl space-y-6">
        <header class="text-center py-6">
            <h1 class="text-5xl font-black text-sky-400 italic uppercase tracking-tighter drop-shadow-[0_2px_10px_rgba(56,189,248,0.15)]">Apka Darterska</h1>
            <p class="text-slate-400 tracking-[0.2em] text-[10px] uppercase font-bold mt-1">Głosowy system liczenia</p>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div class="space-y-4">
                <section class="glass p-5 border border-slate-700/50">
                    <h2 class="text-xs font-bold mb-3 text-sky-400 uppercase tracking-widest">1. Tryb Gry</h2>
                    <div class="grid grid-cols-4 gap-2">
                        <button onclick="selectGameMode('X01')" id="btn-X01" class="game-opt p-3 rounded-xl bg-slate-800/60 border border-slate-700 hover:bg-slate-700 transition font-black text-sm">X01</button>
                        <button onclick="selectGameMode('ATC')" id="btn-ATC" class="game-opt p-3 rounded-xl bg-slate-800/60 border border-slate-700 hover:bg-slate-700 transition font-black text-xs">A-T-C</button>
                        <button onclick="selectGameMode('121')" id="btn-121" class="game-opt p-3 rounded-xl bg-slate-800/60 border border-slate-700 hover:bg-slate-700 transition font-black text-sm">121</button>
                        <button onclick="selectGameMode('RND')" id="btn-RND" class="game-opt p-3 rounded-xl bg-slate-800/60 border border-slate-700 hover:bg-slate-700 transition font-black text-sm text-amber-400">RND</button>
                    </div>
                </section>

                <section id="x01-options" class="hidden glass p-5 border border-slate-700/50">
                    <h2 class="text-xs font-bold mb-3 text-slate-400 uppercase tracking-widest">Ustawienie X01</h2>
                    <div class="grid grid-cols-4 gap-2 text-xs font-bold">
                        <button onclick="setX01Points(301)" id="btn-p301" class="x01-pts p-2 bg-slate-800/60 border border-slate-700 rounded-lg">301</button>
                        <button onclick="setX01Points(501)" id="btn-p501" class="x01-pts p-2 bg-slate-800/60 border border-slate-700 rounded-lg neon-border-cyan">501</button>
                        <button onclick="setX01Points(701)" id="btn-p701" class="x01-pts p-2 bg-slate-800/60 border border-slate-700 rounded-lg">701</button>
                        <button onclick="setX01Points(1001)" id="btn-p1001" class="x01-pts p-2 bg-slate-800/60 border border-slate-700 rounded-lg">1001</button>
                    </div>
                </section>

                <section id="format-options" class="glass p-5 border border-slate-700/50">
                    <h2 class="text-xs font-bold mb-3 text-sky-400 uppercase tracking-widest">2. Format Meczowy</h2>
                    <div class="grid grid-cols-2 gap-3 mb-3 text-xs font-bold">
                        <button onclick="setLegFormat('firstTo')" id="btn-fmt-firstTo" class="leg-fmt p-2.5 rounded-lg bg-slate-800/60 border neon-border-cyan">First to</button>
                        <button onclick="setLegFormat('bestOf')" id="btn-fmt-bestOf" class="leg-fmt p-2.5 rounded-lg bg-slate-800/60 border border-slate-700">Best of</button>
                    </div>
                    <div id="leg-options-container" class="grid grid-cols-4 gap-2 font-bold"></div>
                </section>
            </div>

            <div class="flex flex-col">
                <section class="glass p-5 border border-slate-700/50 h-full flex flex-col justify-between">
                    <div>
                        <h2 class="text-xs font-bold mb-3 uppercase tracking-widest text-sky-400">3. Zawodnicy</h2>
                        <div id="player-inputs" class="space-y-2">
                            <input type="text" placeholder="Twój nick" class="p-name w-full bg-slate-900 border border-slate-700 p-3 rounded-xl focus:border-sky-500 outline-none text-sm font-semibold text-white">
                        </div>
                    </div>
                    <div class="flex gap-2 mt-4">
                        <button onclick="addPlayerInput()" class="flex-1 bg-slate-800/60 hover:bg-slate-700 text-sky-400 text-[10px] py-2.5 font-bold rounded-lg border border-slate-700 uppercase transition-all">+ Gracz</button>
                        <button onclick="addBotInput()" class="flex-1 bg-slate-800/60 hover:bg-slate-700 text-amber-500 text-[10px] py-2.5 font-bold rounded-lg border border-slate-700 uppercase transition-all">+ BOT</button>
                    </div>
                </section>
            </div>
        </div>

        <button onclick="startGame()" class="w-full bg-sky-600 hover:bg-sky-500 text-white font-black py-4 rounded-2xl shadow-lg transition-all text-xl uppercase italic tracking-tighter border border-sky-400/20">
            GRAJ <span id="start-game-name" class="ml-1 text-sky-200"></span>
        </button>
    </div>

    <div id="game-board" class="hidden w-full max-w-xl space-y-4 transition-all">
        <div class="flex justify-between items-center py-2 text-sm font-bold">
            <button onclick="exitGame()" class="text-slate-400 hover:text-white tracking-widest transition-all">← WYJDŹ</button>
            <div id="game-info" class="font-black text-sky-400 italic text-xl tracking-tight">X01</div>
            <button onclick="openConfirmModal()" class="text-slate-400 hover:text-rose-400 tracking-widest transition-all">RESET</button>
        </div>

        <div id="players-display" class="grid grid-cols-1 gap-4"></div>

        <div id="voice-panel" class="glass p-5 border border-slate-700/50 flex items-center justify-between px-6 relative overflow-hidden transition-all">
            <div class="text-left flex items-center">
                <span id="voice-dot" class="status-dot bg-emerald-400 animate-ping"></span>
                <div>
                    <div id="voice-status" class="text-emerald-400 text-sm font-black uppercase tracking-widest">Słucham...</div>
                    <div id="current-player-label" class="text-slate-400 text-[11px] uppercase font-bold tracking-wider mt-0.5">TURA: GRACZ 1</div>
                </div>
            </div>
            <div class="text-right">
                <span id="last-shot-label" class="text-slate-500 text-[10px] block uppercase font-bold tracking-widest">RZUT</span>
                <span id="voice-display" class="text-4xl font-black text-white italic tracking-tighter">---</span>
            </div>
        </div>

        <div id="checkout-container" class="glass p-5 border border-slate-700/50 text-center">
            <div id="checkout-title" class="text-slate-400 text-[11px] uppercase font-bold tracking-widest mb-1">CELUJ W:</div>
            <div id="checkout-suggestion" class="text-amber-400 font-black text-3xl italic tracking-tight">---</div>
            <div id="rnd-buttons" class="hidden grid grid-cols-2 gap-3 mt-3">
                <button onclick="handleRndVoiceCommand(true)" class="bg-emerald-600/20 border border-emerald-500/40 hover:bg-emerald-600 text-emerald-400 hover:text-white p-2.5 rounded-xl text-xs font-black uppercase transition-all">Trafione (Tak)</button>
                <button onclick="handleRndVoiceCommand(false)" class="bg-rose-600/20 border border-rose-500/40 hover:bg-rose-600 text-rose-400 hover:text-white p-2.5 rounded-xl text-xs font-black uppercase transition-all">Pudło (Nie)</button>
            </div>
        </div>

        <div class="space-y-1">
            <div id="game-log" class="space-y-1 text-[11px] text-slate-400 h-24 overflow-y-auto bg-slate-900/60 p-4 rounded-xl font-mono border border-slate-800"></div>
            <div class="text-right pt-1">
                <button onclick="undoLastMove()" id="btn-undo-ui" class="text-rose-400 font-bold text-[10px] uppercase hover:text-rose-300 tracking-wider transition-all">↶ Cofnij ostatni rzut</button>
            </div>
        </div>
    </div>

    <script>
        let gameMode = 'X01';
        let x01TargetPoints = 501;
        let players = [];
        let currentPlayerIndex = 0;
        let shouldBeListening = false;
        let legFormat = 'firstTo'; 
        let legTargetCount = 3;    
        let selectedLegValue = 3;  
        let legStartingPlayerIndex = 0; 
        let turnHistory = [];
        let isCelebrating = false;

        const checkoutTable = { 2: "D1", 4: "D2", 6: "D3", 8: "D4", 10: "D5", 12: "D6", 14: "D7", 16: "D8", 18: "D9", 20: "D10", 22: "D11", 24: "D12", 26: "D13", 28: "D14", 30: "D15", 32: "D16", 34: "D17", 36: "D18", 38: "D19", 40: "D20", 41: "9, D16", 42: "10, D16", 43: "3, D20", 44: "4, D20", 45: "13, D16", 46: "6, D20", 47: "15, D16", 48: "16, D16", 49: "17, D16", 50: "10, D20", 51: "19, D16", 52: "12, D20", 53: "13, D20", 54: "14, D20", 55: "15, D20", 56: "16, D20", 57: "17, D20", 58: "18, D20", 59: "19, D20", 60: "20, D20", 61: "T15, D8", 62: "T10, D16", 63: "T13, D12", 64: "T16, D8", 65: "T11, D16", 66: "T14, D12", 67: "T17, D8", 68: "T16, D10", 69: "T19, D6", 70: "T18, D8", 71: "T13, D16", 72: "T16, D12", 73: "T19, D8", 74: "T14, D16", 75: "T17, D12", 76: "T20, D8", 77: "T19, D10", 78: "T18, D12", 79: "T19, D11", 80: "T20, D10", 81: "T19, D12", 82: "T14, D20", 83: "T17, D16", 84: "T20, D12", 85: "T15, D20", 86: "T18, D16", 87: "T17, D18", 88: "T16, D20", 89: "T19, D16", 90: "T20, D15", 91: "T17, D20", 92: "T20, D16", 93: "T19, D18", 94: "T18, D20", 95: "T19, D19", 96: "T20, D18", 97: "T19, D20", 98: "T20, D19", 99: "T19, Bull", 100: "T20, D20", 101: "T17, T10, D10", 104: "T20, T12, D4", 110: "T20, Bull", 120: "T20, T20, D20", 121: "T20, T11, D14", 130: "T20, T20, D5", 141: "T20, T19, D12", 160: "T20, T20, D20", 164: "T20, T19, Bull", 167: "T20, T19, Bull", 170: "T20, T20, Bull" };

        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.lang = 'pl-PL';
        recognition.continuous = false;

        function showNotification(message) {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast-notification p-4 rounded-xl text-center font-bold bg-slate-800 text-white border border-slate-700 shadow-2xl text-xs tracking-wide`;
            toast.innerText = message;
            container.appendChild(toast);
            setTimeout(() => { toast.remove(); }, 3500);
        }

        function openConfirmModal() {
            document.getElementById('confirm-modal').classList.remove('hidden');
        }

        function closeConfirmModal(shouldReset) {
            document.getElementById('confirm-modal').classList.add('hidden');
            if (shouldReset) startGame();
        }

        function selectGameMode(mode) {
            gameMode = mode;
            document.querySelectorAll('.game-opt').forEach(btn => btn.classList.remove('neon-border-cyan', 'neon-border-amber', 'bg-slate-700'));
            const activeClass = mode === 'RND' ? 'neon-border-amber' : 'neon-border-cyan';
            document.getElementById(`btn-${mode}`).classList.add(activeClass, 'bg-slate-700');
            document.getElementById('x01-options').classList.toggle('hidden', mode !== 'X01');
            document.getElementById('format-options').classList.toggle('hidden', mode === 'RND');
            updateLegOptionsDisplay();
            updateStartButtonText();
        }

        function setX01Points(pts) {
            x01TargetPoints = pts;
            document.querySelectorAll('.x01-pts').forEach(btn => btn.classList.remove('neon-border-cyan', 'bg-slate-700'));
            document.getElementById(`btn-p${pts}`).classList.add('neon-border-cyan', 'bg-slate-700');
            updateStartButtonText();
        }

        function setLegFormat(format) {
            legFormat = format;
            document.querySelectorAll('.leg-fmt').forEach(btn => btn.classList.remove('neon-border-cyan', 'bg-slate-700'));
            document.getElementById(`btn-fmt-${format}`).classList.add('neon-border-cyan', 'bg-slate-700');
            selectedLegValue = (format === 'firstTo') ? 3 : 5; 
            updateLegOptionsDisplay();
            updateStartButtonText();
        }

        function setLegValue(val) {
            selectedLegValue = val;
            legTargetCount = (legFormat === 'firstTo') ? val : Math.ceil(val / 2);
            document.querySelectorAll('.leg-val-btn').forEach(btn => btn.classList.remove('neon-border-cyan', 'bg-slate-700'));
            document.getElementById(`btn-legval-${val}`).classList.add('neon-border-cyan', 'bg-slate-700');
            updateStartButtonText();
        }

        function updateLegOptionsDisplay() {
            const container = document.getElementById('leg-options-container');
            container.innerHTML = '';
            if (gameMode === 'RND') return;
            let options = legFormat === 'firstTo' ? [1, 3, 5, 7] : [3, 5, 7, 9];
            options.forEach(val => {
                const btn = document.createElement('button');
                btn.id = `btn-legval-${val}`;
                btn.className = `leg-val-btn p-2 bg-slate-800 border border-slate-700 rounded-lg hover:bg-slate-700 transition-all ${val === selectedLegValue ? 'neon-border-cyan bg-slate-700' : ''}`;
                btn.innerText = val;
                btn.onclick = () => setLegValue(val);
                container.appendChild(btn);
            });
        }

        function updateStartButtonText() {
            if (gameMode === 'RND') {
                document.getElementById('start-game-name').innerText = `RND (DOUBLE TRAINING)`;
                return;
            }
            let label = gameMode === 'X01' ? `${x01TargetPoints}` : gameMode;
            document.getElementById('start-game-name').innerText = `${label} (DO ${selectedLegValue})`;
        }

        function addPlayerInput() {
            const container = document.getElementById('player-inputs');
            if(container.querySelectorAll('input, .bot-entry').length >= 4) return;
            const input = document.createElement('input');
            input.className = "p-name w-full bg-slate-900 border border-slate-700 p-3 rounded-xl focus:border-sky-500 outline-none text-sm font-semibold text-white";
            input.placeholder = `Gracz ${container.querySelectorAll('input, .bot-entry').length + 1}`;
            container.appendChild(input);
        }

        function addBotInput() {
            const container = document.getElementById('player-inputs');
            if(container.querySelectorAll('input, .bot-entry').length >= 4) return;
            
            const div = document.createElement('div');
            div.className = "bot-entry flex flex-col gap-1 p-3 bg-slate-900 border border-amber-900/40 rounded-xl mt-1";
            div.innerHTML = `
                <div class="flex items-center justify-between mb-1">
                    <span class="text-[10px] font-bold text-amber-500 tracking-widest">BOT DARTOWY</span>
                    <button onclick="this.parentElement.parentElement.remove()" class="text-rose-500 text-xs hover:text-rose-400">USUŃ</button>
                </div>
                <select class="p-bot-range w-full bg-slate-800 border-none text-amber-400 text-xs font-bold rounded-lg p-2 outline-none cursor-pointer">
                    <option value="30-35">Widełki: 30 - 35 AVG</option>
                    <option value="35-40">Widełki: 35 - 40 AVG</option>
                    <option value="40-45">Widełki: 40 - 45 AVG</option>
                    <option value="45-50">Widełki: 45 - 50 AVG</option>
                    <option value="50-60">Widełki: 50 - 60 AVG</option>
                    <option value="60-70">Widełki: 60 - 70 AVG</option>
                    <option value="70-80">Widełki: 70 - 80 AVG</option>
                    <option value="80-100">Widełki: 80 - 100 AVG</option>
                </select>
            `;
            container.appendChild(div);
        }

        function startGame() {
            const inputElements = document.getElementById('player-inputs').children;
            players = [];
            turnHistory = [];
            isCelebrating = false;

            Array.from(inputElements).forEach((el, index) => {
                if (el.tagName === 'INPUT') {
                    const name = el.value.trim();
                    players.push({ 
                        name: name || `Gracz ${index + 1}`, 
                        score: gameMode === 'X01' ? x01TargetPoints : (gameMode === '121' ? 121 : 1),
                        legsWon: 0, history: [], avg: 0, isBot: false 
                    });
                } else if (el.classList.contains('bot-entry')) {
                    const range = el.querySelector('select').value.split('-').map(Number);
                    players.push({ 
                        name: `BOT (${el.querySelector('select').value})`, 
                        score: gameMode === 'X01' ? x01TargetPoints : (gameMode === '121' ? 121 : 1),
                        legsWon: 0, history: [], avg: 0, isBot: true,
                        botMin: range[0], botMax: range[1]
                    });
                }
            });

            currentPlayerIndex = 0;
            legStartingPlayerIndex = 0;
            document.getElementById('lobby').classList.add('hidden');
            document.getElementById('game-board').classList.remove('hidden');
            document.getElementById('game-info').innerText = gameMode;
            renderPlayers();
            checkBotTurn();
        }

        function renderPlayers() {
            const container = document.getElementById('players-display');
            container.innerHTML = '';
            container.className = players.length === 1 ? "grid grid-cols-1 gap-4" : "grid grid-cols-2 gap-4";
            
            players.forEach((p, i) => {
                const isActive = (i === currentPlayerIndex);
                const div = document.createElement('div');
                div.className = `glass rounded-2xl p-6 flex flex-col items-center transition-all duration-300 ${isActive ? 'active-player' : 'opacity-30 scale-95'}`;
                
                div.innerHTML = `
                    <div class="text-xs font-bold text-slate-400 tracking-wider uppercase">${p.name}</div>
                    <div class="text-amber-500 font-bold text-xs mt-1">LEGI: ${p.legsWon}</div>
                    <div class="text-6xl font-black my-2 text-white tracking-tight">${p.score}</div>
                    <div class="text-xs font-bold text-sky-400">AVG: ${p.avg.toFixed(1)}</div>`;
                container.appendChild(div);
            });
            document.getElementById('current-player-label').innerText = `TURA: ${players[currentPlayerIndex].name.toUpperCase()}`;
            
            if (gameMode === 'X01') {
                const currentScore = players[currentPlayerIndex].score;
                document.getElementById('checkout-suggestion').innerText = checkoutTable[currentScore] || "---";
            }
        }

        function checkBotTurn() {
            if (isCelebrating) return;
            const p = players[currentPlayerIndex];
            const dot = document.getElementById('voice-dot');
            const status = document.getElementById('voice-status');

            if (p && p.isBot) {
                shouldBeListening = false;
                try { recognition.stop(); } catch(e) {}
                
                dot.className = "status-dot bg-amber-500 animate-pulse";
                status.innerText = "BOT RZUCA...";
                status.className = "text-amber-500 text-sm font-black";
                
                setTimeout(() => executeBotMove(p), 1800);
            } else {
                shouldBeListening = true;
                startVoiceEngine();
                dot.className = "status-dot bg-emerald-400 animate-ping";
                status.innerText = "Słucham...";
                status.className = "text-emerald-400 text-sm font-black";
            }
        }

        function executeBotMove(bot) {
            if (isCelebrating) return;
            let points = 0;
            const currentAvg = bot.avg;

            if (gameMode === 'X01') {
                if (bot.score <= 170) {
                    if (bot.score <= 40 && bot.score % 2 !== 0) {
                        points = 1; 
                    }
                    else if (bot.score > 40 && bot.score % 2 !== 0 && bot.score <= 130) {
                        points = 5; 
                    } 
                    else {
                        let checkoutChance = 0.20; 
                        if (currentAvg <= bot.botMin + 2) checkoutChance = 0.60;
                        if (currentAvg < bot.botMin) checkoutChance = 0.90; 
                        
                        if (Math.random() < checkoutChance) {
                            points = bot.score; 
                        } else {
                            points = Math.floor(Math.random() * (bot.score - 2));
                            if(points % 2 !== 0) points = Math.max(0, points - 1);
                        }
                    }
                } else {
                    if (bot.history.length === 0) {
                        const starterShots = [26, 41, 45, 60, 81, 100, 140, 180];
                        points = starterShots[Math.floor(Math.random() * starterShots.length)];
                    } else {
                        if (currentAvg > bot.botMax) {
                            const lowShots = [7, 11, 22, 26, 35, 41, 45];
                            points = lowShots[Math.floor(Math.random() * lowShots.length)];
                        } else if (currentAvg < bot.botMin) {
                            const highShots = [60, 81, 100, 121, 140, 180];
                            points = highShots[Math.floor(Math.random() * highShots.length)];
                        } else {
                            const normalShots = [26, 41, 45, 57, 60, 81, 100];
                            points = normalShots[Math.floor(Math.random() * normalShots.length)];
                        }
                    }
                }

                if (bot.score - points < 0 || bot.score - points === 1) points = 0;
            } else {
                points = Math.random() * 100 < bot.botMin ? (gameMode === 'ATC' ? bot.score : 20) : 0;
            }

            handleScore(points);
        }

        function startVoiceEngine() {
            if (!shouldBeListening || isCelebrating) return;
            try { recognition.start(); } catch (e) {}
        }

        function undoLastMove() {
            if (turnHistory.length === 0 || isCelebrating) return;
            const lastState = turnHistory.pop();
            players = JSON.parse(JSON.stringify(lastState.players));
            currentPlayerIndex = lastState.currentPlayerIndex;
            renderPlayers();
            checkBotTurn();
        }

        recognition.onresult = (event) => {
            if (isCelebrating) return;
            const transcript = event.results[0][0].transcript.toLowerCase().trim();
            const p = players[currentPlayerIndex];

            if (["cofnij", "popraw", "błąd"].some(kw => transcript.includes(kw))) { 
                undoLastMove(); 
                return; 
            }

            if (transcript.includes("buja") || transcript.includes("check")) {
                if (p.score <= 170) {
                    handleScore(p.score);
                } else {
                    showNotification("Nie można zakończyć lega z tej wartości! (Max to 170)");
                }
                return;
            }

            const num = parseInt(transcript.replace(/\D/g, ''));
            if (!isNaN(num) && num <= 180) handleScore(num);
        };

        recognition.onend = () => { if (shouldBeListening && !isCelebrating) setTimeout(startVoiceEngine, 300); };

        function handleScore(points) {
            if (isCelebrating) return;
            turnHistory.push({ players: JSON.parse(JSON.stringify(players)), currentPlayerIndex: currentPlayerIndex });
            const p = players[currentPlayerIndex];
            let finished = false;

            if (p.score - points === 0) {
                p.score = 0; 
                p.history.push(points); 
                finished = true;
            } else if (p.score - points > 1) {
                p.score -= points; 
                p.history.push(points);
            } else {
                p.history.push(0); 
            }

            if (p.history.length > 0) {
                const totalPoints = p.history.reduce((a, b) => a + b, 0);
                p.avg = (totalPoints / (p.history.length * 3)) * 3; 
            } else {
                p.avg = 0;
            }

            document.getElementById('voice-display').innerText = points;
            const log = document.getElementById('game-log');
            log.innerHTML = `<div>${p.name}: ${points} pkt</div>` + log.innerHTML;

            if (finished) {
                triggerLegCelebration(p);
            } else {
                currentPlayerIndex = (currentPlayerIndex + 1) % players.length;
                renderPlayers();
                checkBotTurn();
            }
        }

        function triggerLegCelebration(winnerInstance) {
            isCelebrating = true;
            shouldBeListening = false;
            try { recognition.stop(); } catch(e) {}

            winnerInstance.legsWon++;
            renderPlayers();

            document.body.classList.add('celebrate-flash');
            
            document.getElementById('celebration-winner').innerText = winnerInstance.name;
            const overlay = document.getElementById('celebration-overlay');
            overlay.classList.remove('hidden');

            setTimeout(() => {
                document.body.classList.remove('celebrate-flash');
                overlay.classList.add('hidden');
                isCelebrating = false;

                if (winnerInstance.legsWon === legTargetCount) {
                    showNotification(`MECZ ZAKOŃCZONY! Wygrał ${winnerInstance.name}`);
                    setTimeout(exitGame, 1500);
                } else {
                    resetLeg();
                    renderPlayers();
                    checkBotTurn();
                }
            }, 3500);
        }

        function resetLeg() {
            players.forEach(p => {
                p.score = gameMode === 'X01' ? x01TargetPoints : 121;
                p.history = [];
            });
            legStartingPlayerIndex = (legStartingPlayerIndex + 1) % players.length;
            currentPlayerIndex = legStartingPlayerIndex;
        }

        function exitGame() {
            shouldBeListening = false;
            isCelebrating = false;
            try { recognition.stop(); } catch(e) {}
            document.body.classList.remove('celebrate-flash');
            document.getElementById('celebration-overlay').classList.add('hidden');
            document.getElementById('lobby').classList.remove('hidden');
            document.getElementById('game-board').classList.add('hidden');
        }

        selectGameMode('X01');
    </script>
</body>
</html>
